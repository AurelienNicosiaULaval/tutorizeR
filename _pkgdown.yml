destination: pkgdown

template:
  bootstrap: 5

home:
  title: tutorizeR
  description: Convert existing R Markdown and Quarto teaching material into interactive tutorial documents.

navbar:
  structure:
    left: [intro, articles, reference, news]
    right: [search, github]

reference:
  - title: Core conversion
    contents:
      - tutorize
      - convert_to_tutorial
      - convert_folder
  - title: Validation and checking
    contents:
      - validate_input
      - validate_output
      - check_tutorial
      - lint_source
  - title: Question banks and reports
    contents:
      - load_question_bank
      - validate_question_bank
      - write_tutorize_report
      - print.tutorize_report
      - print.tutorize_lint_report
      - print.tutorize_folder_report
  - title: Exports
    contents:
      - export_lms_manifest
      - export_tutorial_package
      - print.tutorize_lms_manifest
  - title: Addins
    contents:
      - launch_tutorizeR_addin
      - launch_tutorizeR_folder_addin
      - launch_tutorizeR_preview_addin
  - title: Internationalization
    contents:
      - tr

articles:
  - title: Start here
    navbar: Start here
    contents:
      - getting-started
      - teaching-workflow-scenario
      - quarto-lesson-interactive-tutorial
